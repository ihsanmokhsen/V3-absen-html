name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        run: |
          mkdir -p site

          cp -f index.html site/
          cp -f style.css site/
          cp -f app.js site/
          cp -f utils.js site/
          cp -f reports.js site/
          cp -f data.js site/
          cp -f supabase-sync.js site/

          if [ -f logobaru.png ]; then cp -f logobaru.png site/; fi
          if [ -f logontt.png ]; then cp -f logontt.png site/; fi

          # Optional local runtime config file to prevent 404 on Pages.
          cat > site/supabase.local.js <<'EOF'
          window.__BPAD_SUPABASE_CONFIG = window.__BPAD_SUPABASE_CONFIG || {};
          EOF

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
