name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p site

          cp -f index.html site/
          cp -f style.css site/
          cp -f app.js site/
          cp -f utils.js site/
          cp -f reports.js site/
          cp -f data.js site/
          cp -f supabase-sync.js site/

          if [ -f logobaru.png ]; then cp -f logobaru.png site/; fi
          if [ -f logontt.png ]; then cp -f logontt.png site/; fi

          # Build runtime config for GitHub Pages from repository secrets.
          if [ -n "${SUPABASE_URL}" ] && [ -n "${SUPABASE_ANON_KEY}" ]; then
            cat > site/supabase.local.js <<EOF
          window.__BPAD_SUPABASE_CONFIG = {
            url: "${SUPABASE_URL}",
            anonKey: "${SUPABASE_ANON_KEY}"
          };
          EOF
          else
            cat > site/supabase.local.js <<'EOF'
          window.__BPAD_SUPABASE_CONFIG = window.__BPAD_SUPABASE_CONFIG || {};
          EOF
            echo "WARNING: SUPABASE_URL or SUPABASE_ANON_KEY secret is missing."
          fi

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
