name: Supabase Keepalive

on:
  schedule:
    - cron: "15 0 */2 * *"
  workflow_dispatch:

jobs:
  ping-db:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}"
          test -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Upsert heartbeat row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          NOW_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          PAYLOAD=$(cat <<EOF
          [{"id":"main","source":"github-actions","last_seen":"${NOW_UTC}"}]
          EOF
          )

          RESPONSE=$(curl -sS --fail-with-body \
            -X POST "${SUPABASE_URL}/rest/v1/system_heartbeat?on_conflict=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            --data "${PAYLOAD}")

          echo "Heartbeat upsert success"
          echo "$RESPONSE"
